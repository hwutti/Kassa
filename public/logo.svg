<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Kirchtagsfest">
  <!-- Transparenter Hintergrund, grünes Emblem mit Bierkrug -->
  <circle cx="32" cy="32" r="30" fill="#16a34a"/>
  <g fill="none" stroke="#ffffff" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round">
    <!-- Krug -->
    <path d="M22 20 h16 v22 a4 4 0 0 1 -4 4 h-8 a4 4 0 0 1 -4 -4 z" fill="#ffffff" fill-opacity="0.15"/>
    <!-- Henkel -->
    <path d="M38 25 h5 a4 4 0 0 1 4 4 v6 a4 4 0 0 1 -4 4 h-5"/>
    <!-- Schaumkrone -->
    <path d="M22 20 q2 -5 6 -3 q3 -5 8 -2 q4 -1 2 5" fill="#ffffff" fill-opacity="0.9" stroke="none"/>
    <!-- Füllstand -->
    <line x1="22" y1="30" x2="38" y2="30"/>
  </g>
</svg>
