<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline – POS-Kasse</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: #e5e5e5;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        text-align: center;
        padding: 1.5rem;
      }
      .box {
        max-width: 24rem;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.5rem;
      }
      p {
        color: #a3a3a3;
        line-height: 1.5;
      }
      button {
        margin-top: 1rem;
        background: #16a34a;
        color: #fff;
        border: 0;
        border-radius: 0.75rem;
        padding: 0.75rem 1.25rem;
        font-size: 1rem;
        min-height: 3rem;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Keine Verbindung</h1>
      <p>
        Die Kasse ist offline. Aus Sicherheitsgründen können ohne Verbindung keine neuen
        Bestellungen abgeschlossen werden, damit keine veralteten Preise verwendet werden.
      </p>
      <button onclick="location.reload()">Erneut versuchen</button>
    </div>
  </body>
</html>
