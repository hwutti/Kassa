# Beispiel-Reverse-Proxy für die POS-Kasse (nginx).
# HTTPS ist für PWA-Installation und Service Worker im Produktivbetrieb erforderlich.
# TLS-Zertifikat z. B. per certbot (Let's Encrypt) einrichten.
#
# Ablage:  /etc/nginx/sites-available/kassa  ->  symlink nach sites-enabled
#          nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name kassa.example.at;
    # HTTP -> HTTPS erzwingen
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kassa.example.at;

    ssl_certificate     /etc/letsencrypt/live/kassa.example.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kassa.example.at/privkey.pem;

    # Uploads-Limit passend zur App (8 MB Bilder + Puffer)
    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
